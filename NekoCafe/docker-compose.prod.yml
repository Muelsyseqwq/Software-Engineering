services:
  redis:
    image: docker.m.daocloud.io/library/redis:7-alpine
    container_name: nekocafe-redis
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nekocafe-backend
    env_file:
      - .env
    environment:
      NEKO_PROFILE: dev
      FLYWAY_ENABLED: "true"
      REDIS_HOST: redis
    ports:
      - "8080:8080"
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nekocafe-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
